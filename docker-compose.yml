services:
  nuhtc:
    image: nuhtc:latest
    build:
      context: .
      dockerfile: Dockerfile

    # GPU access via nvidia-container-toolkit (compose >= 1.28).
    # Using shm_size instead of ipc: host to avoid sharing the host IPC
    # namespace — shm_size gives DataLoader workers enough shared memory
    # while keeping the container isolated. Switch to ipc: host only if
    # you need >16 GB of shared memory or encounter NCCL multi-GPU issues.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    shm_size: '16gb'

    working_dir: /workspace
    tty: true
    stdin_open: true

    # No bind mounts by default — /workspace is the image filesystem (baked
    # models/demo). Uncomment below to use host data for training/testing.
    #
    # Example (copy under `nuhtc:` at same indent as `environment:`):
    #   volumes:
    #     - ./datasets:/workspace/datasets   # PanNuke numpy masks/images
    #     - ./coco:/workspace/coco           # COCO JSON annotations
    #     - ./work_dirs:/workspace/work_dirs # checkpoints, logs, preds
    # Optional — replace baked weights or demo (creates empty dirs if missing):
    #     - ./models:/workspace/models
    #     - ./demo:/workspace/demo
    #
    # One-off without editing this file:
    #   docker compose run --rm -v ./datasets:/workspace/datasets \
    #     -v ./coco:/workspace/coco -v ./work_dirs:/workspace/work_dirs nuhtc

    environment:
      - WANDB_MODE=offline
      - CUDA_VISIBLE_DEVICES=0
